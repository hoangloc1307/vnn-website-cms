name: vnn-website

services:
  nginx:
    image: nginx:1.30.0-alpine
    container_name: vnn-website-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - wordpress_data:/var/www/html
    depends_on:
      - wordpress
    restart: unless-stopped
    networks:
      - vnn-website-network

  wordpress:
    image: wordpress:6.9-php8.2-fpm
    container_name: vnn-website-wordpress
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: vnn-admin
      WORDPRESS_DB_PASSWORD: VNN@123
      WORDPRESS_DB_NAME: vnn-website-db
      PHP_UPLOAD_MAX_FILESIZE: 64M
      PHP_POST_MAX_SIZE: 64M
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - vnn-website-network

  mysql:
    image: mysql:8.0.46
    container_name: vnn-website-mysql
    environment:
      MYSQL_DATABASE: vnn-website-db
      MYSQL_USER: vnn-admin
      MYSQL_PASSWORD: VNN@123
      MYSQL_ROOT_PASSWORD: VNN@root123
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - vnn-website-network

networks:
  vnn-website-network:

volumes:
  wordpress_data:
  db_data:
